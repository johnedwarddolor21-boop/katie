<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Birthday Greeting</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb);
      overflow:hidden;
      font-family:Arial,sans-serif;
      perspective:1200px;
    }

    /* Floating Background Balls */
    .ball{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.3);
      backdrop-filter: blur(5px);
      animation: float 10s infinite linear;
    }

    @keyframes float{
      from{
        transform:translateY(100vh) scale(0.5);
      }
      to{
        transform:translateY(-120vh) scale(1.2);
      }
    }

    /* 3D Card */
    .card{
      width:380px;
      padding:30px;
      background:rgba(255,255,255,0.15);
      border-radius:25px;
      text-align:center;
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.3);
      box-shadow:0 20px 50px rgba(0,0,0,0.25);
      transform-style:preserve-3d;
      animation: cardFloat 4s ease-in-out infinite;
      position:relative;
      z-index:5;
    }

    @keyframes cardFloat{
      0%,100%{
        transform: rotateY(-8deg) rotateX(5deg) translateY(0);
      }
      50%{
        transform: rotateY(8deg) rotateX(-5deg) translateY(-15px);
      }
    }

    /* Photo */
    .photo{
      width:180px;
      height:180px;
      border-radius:50%;
      object-fit:cover;
      border:6px solid white;
      box-shadow:0 15px 30px rgba(0,0,0,0.3);
      margin-bottom:20px;
      transform:translateZ(40px);
      transition:0.5s;
    }

    .photo:hover{
      transform:translateZ(60px) scale(1.05);
    }

    /* Title */
    h1{
      color:white;
      font-size:2.6rem;
      margin-bottom:15px;
      text-shadow:0 5px 15px rgba(0,0,0,0.3);
      transform:translateZ(35px);
    }

    /* Message */
    p{
      color:white;
      font-size:1.1rem;
      line-height:1.6;
      transform:translateZ(25px);
    }

    /* Button */
    button{
      margin-top:25px;
      padding:12px 28px;
      border:none;
      border-radius:40px;
      background:white;
      color:#ff4081;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.4s;
      transform:translateZ(40px);
      box-shadow:0 10px 20px rgba(0,0,0,0.2);
    }

    button:hover{
      transform:translateZ(60px) scale(1.08);
      background:#ff4081;
      color:white;
    }

    /* Music Control */
    .music-text{
      margin-top:15px;
      color:white;
      font-size:0.9rem;
      transform:translateZ(20px);
    }

    /* Confetti */
    .confetti{
      position:absolute;
      width:10px;
      height:10px;
      top:-10px;
      animation:fall linear infinite;
      z-index:1;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(720deg);
      }
    }

  </style>
</head>
<body>

  <!-- Background Floating Balls -->
  <script>
    for(let i=0;i<20;i++){
      let ball=document.createElement("div");
      ball.classList.add("ball");

      let size=Math.random()*80+20;

      ball.style.width=size+"px";
      ball.style.height=size+"px";
      ball.style.left=Math.random()*100+"vw";
      ball.style.animationDuration=(Math.random()*10+5)+"s";
      ball.style.opacity=Math.random();

      document.body.appendChild(ball);
    }
  </script>

  <!-- Birthday Card -->
  <div class="card">

    <!-- Replace photo.jpg with your image -->
    <img src="katie.png" alt="Birthday Photo" class="photo">

    <h1>Happy Birthday Katie!</h1>

    <p>
      Wishing you a magical birthday filled with love,
      happiness, laughter, and unforgettable moments. 💖
    </p>

    <button onclick="showMessage()">Birthday Surprise</button>

    <div class="music-text">
      🎵 Birthday music is playing...
    </div>

  </div>

  <!-- Audio -->
  <!-- Replace birthday-song.mp3 with your audio file -->
  <audio autoplay loop>
    <source src="birthday-song.mp3" type="audio/mpeg">
    Your browser does not support audio.
  </audio>

  <script>

    function showMessage(){
      alert("Happy Birthday Katie! May all your dreams come true!");
    }

    /* Confetti Effect */
    for(let i=0;i<80;i++){

      const confetti=document.createElement("div");
      confetti.classList.add("confetti");

      confetti.style.left=Math.random()*100+"vw";

      confetti.style.backgroundColor=
      ["#ff4081","#ff9800","#3f51b5","#4caf50","#ffffff"]
      [Math.floor(Math.random()*5)];

      confetti.style.animationDuration=
      (Math.random()*3+2)+"s";

      confetti.style.width=
      confetti.style.height=
      (Math.random()*8+5)+"px";

      document.body.appendChild(confetti);
    }

  </script>

</body>
</html>
